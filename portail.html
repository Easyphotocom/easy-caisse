<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Espace Pro — EasyPhotoCOM</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #d42b2b;
      --red-dark: #a01e1e;
      --red-light: #e85555;
      --dark: #0e0e0c;
      --dark2: #1a1a16;
      --dark3: #252520;
      --cream: #f5f2eb;
      --text-muted: #7a7a6a;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
      color: var(--cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 50%, rgba(212,43,43,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 80% 30%, rgba(212,43,43,0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(212,43,43,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(212,43,43,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* ── Écran cadenas ── */
    .lock-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      animation: fadeIn 0.8s ease both;
    }

    .brand { text-align: center; }
    .brand-sub {
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 10px;
    }

    .lock-icon-wrap {
      position: relative;
      cursor: pointer;
      margin-top: 4px;
    }
    .lock-icon-wrap:hover .lock-circle {
      border-color: var(--red);
      background: rgba(212,43,43,0.1);
      transform: scale(1.05);
    }
    .lock-icon-wrap:hover .lock-svg { color: var(--red-light); }
    .lock-circle {
      width: 90px;
      height: 90px;
      border: 1.5px solid rgba(212,43,43,0.35);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(212,43,43,0.05);
      transition: all 0.3s ease;
    }
    .lock-svg {
      font-size: 34px;
      color: var(--red);
      transition: color 0.3s;
      line-height: 1;
    }
    .lock-hint {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-align: center;
    }

    /* ── Portail ── */
    .portal-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 100%;
      max-width: 360px;
      animation: slideUp 0.5s ease both;
      padding: 0 16px;
    }

    .portal-header { text-align: center; margin-bottom: 4px; }
    .portal-sep {
      width: 40px; height: 1.5px;
      background: linear-gradient(90deg, transparent, var(--red), transparent);
      margin: 10px auto 0;
    }
    .portal-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
      letter-spacing: 0.05em;
    }

    .portal-btn {
      width: 100%;
      padding: 16px 20px;
      border-radius: 12px;
      border: 1px solid rgba(212,43,43,0.2);
      background: var(--dark2);
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 14px;
      text-align: left;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }
    .portal-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(212,43,43,0.07), transparent);
      opacity: 0;
      transition: opacity 0.25s;
    }
    .portal-btn:hover { border-color: rgba(212,43,43,0.5); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,0.35); }
    .portal-btn:hover::before { opacity: 1; }
    .portal-btn:active { transform: translateY(0); }

    .portal-btn-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .icon-caisse { background: rgba(212,43,43,0.12); }
    .icon-resa   { background: rgba(99,168,201,0.12); }
    .icon-dep    { background: rgba(99,201,140,0.12); }

    .portal-btn-text { flex: 1; }
    .portal-btn-label { font-size: 14px; font-weight: 600; margin-bottom: 2px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
    .portal-btn-desc  { font-size: 11px; color: var(--text-muted); }
    .portal-btn-arrow { color: var(--text-muted); font-size: 16px; transition: transform 0.2s; }
    .portal-btn:hover .portal-btn-arrow { transform: translateX(4px); color: var(--red-light); }

    .portal-lock-badge {
      font-size: 10px;
      background: rgba(212,43,43,0.15);
      color: #f87171;
      border-radius: 4px;
      padding: 2px 6px;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .back-link {
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
      background: none;
      border: none;
      font-family: inherit;
      margin-top: 2px;
    }
    .back-link:hover { color: var(--cream); }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(6px);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.show { display: flex; animation: fadeIn 0.2s ease; }

    .modal-card {
      background: var(--dark2);
      border: 1px solid rgba(212,43,43,0.25);
      border-radius: 16px;
      padding: 28px 24px;
      width: 100%;
      max-width: 300px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.6);
      animation: slideUp 0.3s ease;
    }
    .modal-logo { text-align:center; margin-bottom:14px; }
    .modal-logo img { width:70px; height:auto; filter:drop-shadow(0 2px 6px rgba(0,0,0,0.4)); }
    .modal-title { font-family:'Playfair Display',serif; font-size:17px; font-weight:700; margin-bottom:3px; }
    .modal-sub { font-size:12px; color:var(--text-muted); margin-bottom:18px; }
    .modal-input {
      width:100%; height:50px;
      background:var(--dark3);
      border:1px solid rgba(212,43,43,0.25);
      border-radius:10px;
      color:var(--cream);
      font-family:'DM Sans',sans-serif;
      font-size:22px; font-weight:600;
      text-align:center;
      letter-spacing:0.15em;
      padding:0 12px;
      transition:border-color 0.2s;
    }
    .modal-input:focus { outline:none; border-color:var(--red); }
    .modal-input.error { border-color:#dc2626; animation:shake 0.3s ease; }
    .modal-error { color:#f87171; font-size:12px; margin-top:8px; min-height:16px; text-align:center; }
    .modal-actions { display:flex; gap:10px; margin-top:14px; }
    .modal-cancel {
      flex:1; height:44px; background:transparent;
      border:1px solid rgba(255,255,255,0.1); border-radius:10px;
      color:var(--text-muted); font-family:'DM Sans',sans-serif;
      font-size:13px; font-weight:500; cursor:pointer; transition:all 0.2s;
    }
    .modal-cancel:hover { border-color:rgba(255,255,255,0.25); color:var(--cream); }
    .modal-confirm {
      flex:2; height:44px;
      background:linear-gradient(135deg, var(--red-dark), var(--red));
      border:none; border-radius:10px;
      color:#fff; font-family:'DM Sans',sans-serif;
      font-size:13px; font-weight:700; cursor:pointer; transition:all 0.2s;
    }
    .modal-confirm:hover { opacity:0.9; transform:translateY(-1px); }

    /* Redirect overlay */
    .redirect-overlay {
      display:none;
      position:fixed; inset:0;
      background:var(--dark);
      z-index:300;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:20px;
    }
    .redirect-overlay.show { display:flex; animation:fadeIn 0.3s ease; }
    .redirect-spinner {
      width:40px; height:40px;
      border:2px solid rgba(212,43,43,0.2);
      border-top-color:var(--red);
      border-radius:50%;
      animation:spin 0.8s linear infinite;
    }
    .redirect-msg { font-size:13px; color:var(--text-muted); }

    @keyframes fadeIn  { from { opacity:0 } to { opacity:1 } }
    @keyframes slideUp { from { opacity:0;transform:translateY(20px) } to { opacity:1;transform:translateY(0) } }
    @keyframes shake   { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
    @keyframes spin    { to { transform:rotate(360deg) } }
  </style>
</head>

    <div class="modal-title">Accès restreint</div>
    <div class="modal-sub" id="modal-sub">Zone administrateur</div>
    <input class="modal-input" type="password" id="modal-input"
           placeholder="••••" maxlength="20"
           onkeydown="if(event.key==='Enter') confirmPassword()"/>
    <div class="modal-error" id="modal-error"></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Annuler</button>
      <button class="modal-confirm" onclick="confirmPassword()">Accéder →</button>
    </div>
  </div>
</div>

<!-- Overlay redirection -->
<div class="redirect-overlay" id="redirect-overlay">
  <div class="redirect-spinner"></div>
  <div class="redirect-msg">Ouverture en cours…</div>
</div>

<script>
  const ADMIN_PASSWORD = '1018';
  let pendingUrl = '';

  function openPortal() {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('portal-screen').style.display = 'flex';
  }

  function closePortal() {
    document.getElementById('portal-screen').style.display = 'none';
    document.getElementById('lock-screen').style.display = 'flex';
  }

  function goDirectly(url) {
    showRedirect();
    setTimeout(() => { window.location.href = url; }, 400);
  }

  function openProtected(url, label) {
    pendingUrl = url;
    document.getElementById('modal-sub').textContent = label + ' — zone administrateur';
    document.getElementById('modal-input').value = '';
    document.getElementById('modal-input').classList.remove('error');
    document.getElementById('modal-error').textContent = '';
    document.getElementById('modal').classList.add('show');
    setTimeout(() => document.getElementById('modal-input').focus(), 150);
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('show');
    pendingUrl = '';
  }

  function confirmPassword() {
    const val = document.getElementById('modal-input').value;
    if (val === ADMIN_PASSWORD) {
      closeModal();
      showRedirect();
      setTimeout(() => { window.location.href = pendingUrl; }, 400);
    } else {
      const inp = document.getElementById('modal-input');
      inp.classList.add('error');
      document.getElementById('modal-error').textContent = 'Code incorrect. Réessayez.';
      inp.value = '';
      setTimeout(() => inp.classList.remove('error'), 400);
    }
  }

  function showRedirect() {
    document.getElementById('redirect-overlay').classList.add('show');
  }

  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
</script>
</body>
</html>
